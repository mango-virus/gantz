<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Level Preview</title>
<style>
  html, body { margin: 0; padding: 0; background: #05060c; color: #cfd9ec; font-family: ui-monospace, Menlo, Consolas, monospace; height: 100%; overflow: hidden; }
  #c { display: block; width: 100vw; height: 100vh; }
  #hud { position: fixed; top: 8px; left: 10px; font-size: 11px; line-height: 1.5; background: rgba(0,0,0,.55); padding: 6px 9px; border: 1px solid #2a3a55; pointer-events: none; }
  #hud b { color: #00e5ff; }
  #hud span.k { color: #ff2d8a; }
  #hud .title { font-size: 12px; }
  #ctrls { position: fixed; bottom: 10px; left: 10px; font-size: 10px; opacity: .8; background: rgba(0,0,0,.45); padding: 5px 8px; border: 1px solid #1d2740; }
  #stats { position: fixed; top: 8px; right: 10px; font-size: 11px; background: rgba(0,0,0,.55); padding: 6px 9px; border: 1px solid #2a3a55; }
  #export { position: fixed; bottom: 10px; right: 10px; display: flex; gap: 6px; }
  #export button, #export a { background: #0e1422; color: #cfd9ec; border: 1px solid #2a3a55; padding: 6px 10px; font: inherit; font-size: 11px; cursor: pointer; text-decoration: none; }
  #export button:hover, #export a:hover { background: #1a2438; }
  #err { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #05060c; color: #ff2d8a; font-size: 14px; padding: 2rem; text-align: center; }
  #err a { color: #00e5ff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <b class="title" id="hud-title">— LEVEL PREVIEW</b><br>
  <span class="k">drag</span> rotate · <span class="k">right-drag</span> pan · <span class="k">wheel</span> zoom<br>
  <span class="k">F</span> reset · <span class="k">G</span> toggle ground · <span class="k">L</span> toggle lights<br>
  <span class="k">S</span> toggle spawns · <span class="k">H</span> toggle hazards · <span class="k">C</span> toggle colliders<br>
  <span class="k">O</span> drop obstacle at orbit target · <span class="k">X</span> clear obstacles
</div>
<div id="stats"></div>
<div id="ctrls"></div>
<div id="export">
  <a href="/levels.html">← Levels</a>
  <button id="btn-export">Export collision JSON</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://esm.sh/three@0.160.0",
    "three/addons/": "https://esm.sh/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { getLevel } from './src/content/levelRegistry.js';

// ── Resolve level from URL ?id=<name> ──────────────────────────────────────
const params = new URLSearchParams(location.search);
const levelId = params.get('id');
const entry = levelId ? getLevel(levelId) : null;

if (!entry) {
  document.body.innerHTML = `<div id="err">
    Unknown level id: <b>${levelId ?? '(none)'}</b><br><br>
    <a href="/levels.html">← back to level picker</a>
  </div>`;
  throw new Error('Level not found: ' + levelId);
}

document.title = `${entry.title} — Level Preview`;
document.getElementById('hud-title').textContent = `${entry.title.toUpperCase()} — LEVEL PREVIEW`;

const mod = await entry.load();
const buildLevel       = mod[entry.exports.build];
const SPAWNS           = mod[entry.exports.spawns];
const LEVEL_BOUNDS     = mod[entry.exports.bounds];
const exportColliderJSON = mod[entry.exports.exportJSON];

if (typeof buildLevel !== 'function') {
  throw new Error(`Level '${entry.id}' module missing export '${entry.exports.build}'`);
}

// ── Renderer ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.9;

// ── Scene + camera ─────────────────────────────────────────────────────────
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 1000);
const camPos = entry.camera?.pos ?? [60, 70, 110];
const camTgt = entry.camera?.target ?? [0, 4, 0];
camera.position.set(...camPos);
camera.lookAt(...camTgt);

const controls = new OrbitControls(camera, canvas);
controls.target.set(...camTgt);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxDistance = 350;
controls.minDistance = 4;

// ── Build level ─────────────────────────────────────────────────────────────
const level = buildLevel(THREE);
scene.add(level.root);
level.applyAtmosphere?.(scene);

// ── Spawn-point markers ────────────────────────────────────────────────────
function makeMarkerGroup(spawns) {
  const g = new THREE.Group();
  g.name = 'spawn_markers';
  if (!spawns) return g;
  const make = (color, sx, sy, sz) => {
    const m = new THREE.Mesh(
      new THREE.ConeGeometry(0.5, 1.6, 6),
      new THREE.MeshBasicMaterial({ color, transparent: true, opacity: 0.8 })
    );
    m.position.set(sx, (sy ?? 0) + 1.5, sz);
    return m;
  };
  for (const s of (spawns.player  ?? [])) g.add(make(0x00e5ff, s.x, s.y, s.z));
  for (const s of (spawns.enemies ?? [])) g.add(make(0xff2030, s.x, s.y, s.z));
  for (const s of (spawns.cover   ?? [])) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(0.4, 8, 6),
      new THREE.MeshBasicMaterial({ color: 0xffd200, transparent: true, opacity: 0.7 })
    );
    m.position.set(s.x, 0.5, s.z);
    g.add(m);
  }
  return g;
}
const markers = makeMarkerGroup(SPAWNS);
scene.add(markers);

// ── Hazard outlines ─────────────────────────────────────────────────────────
function makeHazardOutlines(hazards) {
  const g = new THREE.Group();
  g.name = 'hazard_outlines';
  if (!hazards) return g;
  for (const h of hazards) {
    if (h.kind === 'manhole') {
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(0.85, 1.0, 24),
        new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.7, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.set(h.x, 0.2, h.z);
      g.add(ring);
    } else if (h.kind === 'stormDrain') {
      const dx = h.to.x - h.from.x, dz = h.to.z - h.from.z;
      const len = Math.hypot(dx, dz);
      const cx = (h.from.x + h.to.x) / 2, cz = (h.from.z + h.to.z) / 2;
      const ang = Math.atan2(dz, dx);
      const m = new THREE.Mesh(
        new THREE.PlaneGeometry(len, h.w ?? 4),
        new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.18, side: THREE.DoubleSide, wireframe: true })
      );
      m.rotation.x = -Math.PI / 2;
      m.rotation.z = ang;
      m.position.set(cx, 0.05, cz);
      g.add(m);
    }
  }
  return g;
}
const hazardOutlines = makeHazardOutlines(level.hazards);
scene.add(hazardOutlines);

// ── Collider debug viz (C key) ──────────────────────────────────────────────
const CATEGORY_COLOR = {
  solid:        0xff3030,
  cover:        0xffd200,
  destructible: 0xff8000,
  trigger:      0x40ff60,
  climbable:    0x4080ff,
  passthrough:  0x808890,
};
const colliderGroup = new THREE.Group();
colliderGroup.name = 'collider_debug';
colliderGroup.visible = false;
scene.add(colliderGroup);
const dynamicWireframes = [];
function buildColliderDebug() {
  while (colliderGroup.children.length) {
    const c = colliderGroup.children.pop();
    c.geometry?.dispose?.();
  }
  dynamicWireframes.length = 0;
  for (const c of (level.colliders ?? [])) {
    if (c.type !== 'aabb' || !c.bounds) continue;
    const { min, max } = c.bounds;
    const w = Math.max(0.01, max.x - min.x);
    const h = Math.max(0.01, max.y - min.y);
    const d = Math.max(0.01, max.z - min.z);
    const color = CATEGORY_COLOR[c.category] ?? 0xff00ff;
    const opacity = c.category === 'passthrough' ? 0.18 : 0.9;
    const wf = new THREE.LineSegments(
      new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1)),
      new THREE.LineBasicMaterial({ color, transparent: true, opacity })
    );
    wf.position.set((min.x + max.x) / 2, (min.y + max.y) / 2, (min.z + max.z) / 2);
    wf.scale.set(w, h, d);
    colliderGroup.add(wf);
    if (c.dynamic) dynamicWireframes.push({ wf, collider: c });
    if (!c.dynamic && (c.category === 'solid' || c.category === 'cover' || c.category === 'destructible')) {
      const jumpY = min.y + 1.2;
      if (jumpY < max.y) {
        const lineGeo = new THREE.BufferGeometry().setFromPoints([
          new THREE.Vector3(min.x, jumpY, min.z), new THREE.Vector3(max.x, jumpY, min.z),
          new THREE.Vector3(max.x, jumpY, min.z), new THREE.Vector3(max.x, jumpY, max.z),
          new THREE.Vector3(max.x, jumpY, max.z), new THREE.Vector3(min.x, jumpY, max.z),
          new THREE.Vector3(min.x, jumpY, max.z), new THREE.Vector3(min.x, jumpY, min.z),
        ]);
        const line = new THREE.LineSegments(
          lineGeo,
          new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.18 })
        );
        colliderGroup.add(line);
      }
    }
  }
}
function syncDynamicWireframes() {
  for (const { wf, collider } of dynamicWireframes) {
    const { min, max } = collider.bounds;
    wf.position.set((min.x + max.x) / 2, (min.y + max.y) / 2, (min.z + max.z) / 2);
    wf.scale.set(
      Math.max(0.01, max.x - min.x),
      Math.max(0.01, max.y - min.y),
      Math.max(0.01, max.z - min.z),
    );
  }
}
buildColliderDebug();

// ── Test obstacle ───────────────────────────────────────────────────────────
const testObstacles = [];
const obstacleGroup = new THREE.Group();
obstacleGroup.name = 'test_obstacles';
scene.add(obstacleGroup);
function addObstacleAt(x, z) {
  const m = new THREE.Mesh(
    new THREE.CylinderGeometry(0.5, 0.5, 1.8, 12),
    new THREE.MeshBasicMaterial({ color: 0xff8000 })
  );
  m.position.set(x, 0.9, z);
  obstacleGroup.add(m);
  testObstacles.push({ x, z, r: 0.5, mesh: m });
}

// ── Stats ───────────────────────────────────────────────────────────────────
let meshCount = 0;
level.root.traverse(o => { if (o.isMesh) meshCount++; });
const stats = document.getElementById('stats');
const cs = level.colliders ?? [];
const catCounts = cs.reduce((a, c) => { a[c.category] = (a[c.category] || 0) + 1; return a; }, {});
const catLine = Object.entries(catCounts).map(([k, v]) => `${k}:${v}`).join(' ');
const bounds = LEVEL_BOUNDS
  ? `${LEVEL_BOUNDS.maxX - LEVEL_BOUNDS.minX} × ${LEVEL_BOUNDS.maxZ - LEVEL_BOUNDS.minZ}u`
  : (entry.bounds ?? '?');
stats.innerHTML = `
  <b style="color:#ff2d8a">${entry.title}</b><br>
  meshes: ${meshCount}<br>
  buildings: ${level.buildings?.length ?? 0}<br>
  colliders: ${cs.length}<br>
  <span style="font-size:10px;opacity:.85">${catLine}</span><br>
  hazards: ${level.hazards?.length ?? 0}<br>
  bounds: ${bounds}
`;

// ── Hotkeys ─────────────────────────────────────────────────────────────────
const ground   = level.groups?.decals;
const lights   = level.groups?.lights;
const hazardsG = level.groups?.hazards;

addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  if (k === 'f') {
    camera.position.set(...camPos);
    controls.target.set(...camTgt);
  }
  if (k === 'g' && ground)   ground.visible   = !ground.visible;
  if (k === 'l' && lights)   lights.visible   = !lights.visible;
  if (k === 's')             markers.visible  = !markers.visible;
  if (k === 'h' && hazardsG) hazardsG.visible = !hazardsG.visible;
  if (k === 'c')             colliderGroup.visible = !colliderGroup.visible;
  if (k === 'o') addObstacleAt(controls.target.x, controls.target.z);
  if (k === 'x') {
    while (obstacleGroup.children.length) obstacleGroup.remove(obstacleGroup.children[0]);
    testObstacles.length = 0;
  }
});

// ── Export collision JSON ──────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  if (typeof exportColliderJSON !== 'function') {
    console.warn(`Level '${entry.id}' has no exportColliderJSON export`);
    return;
  }
  const json = exportColliderJSON(level);
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${entry.id}-colliders.json`;
  a.click();
});

// ── Resize ──────────────────────────────────────────────────────────────────
function resize() {
  renderer.setSize(innerWidth, innerHeight, false);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
}
addEventListener('resize', resize);
resize();

// ── Loop ────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function tick() {
  const dt = Math.min(0.05, clock.getDelta());
  const t = clock.elapsedTime;
  level.update?.(dt, t, { obstacles: testObstacles });
  if (colliderGroup.visible) syncDynamicWireframes();
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

// Expose for devtools — keyed both by generic name and the level-specific
// shim some tooling expects (e.g. window.__kabukicho).
window.__levelPreview = { THREE, scene, camera, level, controls, testObstacles, addObstacleAt, entry };
window[`__${entry.id}`] = window.__levelPreview;
console.log(`[level:${entry.id}] loaded — meshes: ${meshCount}, colliders: ${cs.length}`);
</script>
</body>
</html>
